  <script>
    const DATA_SOURCES = [
      'graph-data.json',
      'https://awuchen.github.io/craft-network/graph-data.json',
      'https://awuchen.github.io/craft-network-3d/graph-data.json',
    ];

    async function loadGraphData() {
      let lastError = null;
      for (const source of DATA_SOURCES) {
        try {
          const response = await fetch(source, { cache: 'no-cache' });
          if (!response.ok) throw new Error(`${source} returned ${response.status}`);
          const payload = await response.json();
          if (!payload.nodes || !payload.links) throw new Error(`${source} missing nodes/links`);
          return payload;
        } catch (error) {
          lastError = error;
          console.warn('Graph data source failed:', source, error);
        }
      }
      throw lastError || new Error('No graph data sources available');
    }

    function sanitizeGraph(payload) {
      const nodes = (payload.nodes || []).filter((n) => n && n.id);
      const nodeIds = new Set(nodes.map((n) => n.id));
      const links = (payload.links || []).filter(
        (l) => l && l.source && l.target && nodeIds.has(l.source) && nodeIds.has(l.target)
      );
      return { nodes, links };
    }

    function renderGraph(payload) {
      const start = new Date();
      const gData = sanitizeGraph(payload);
      ForceGraph3D()(document.getElementById('3d-graph'))
        .graphData(gData)
        .cameraPosition({ z: 600 })
        .backgroundColor('#000011');
      console.log('Loaded ' + gData.nodes.length + ' nodes, ' + gData.links.length + ' links in ' + (new Date() - start) + ' ms.');
    }

    loadGraphData()
      .then(renderGraph)
      .catch(function (error) {
        console.warn('Could not load Craft Network background graph:', error);
      });
  </script>
